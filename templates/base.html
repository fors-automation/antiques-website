{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Glory Days Past{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <header class="site-header">
        <a class="brand" href="{% url 'shop:home' %}">
            <span class="brand-name">Glory Days Past</span>
            <span class="brand-tagline">Antiques &amp; Curiosities</span>
        </a>
        <nav class="site-nav">
            <a href="{% url 'shop:home' %}">Home</a>
            <a href="{% url 'shop:contact' %}">Contact</a>
        </nav>
    </header>

    <main class="site-main">
        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
        <p>&copy; {% now "Y" %} Glory Days Past. All rights reserved.</p>
    </footer>
</body>
</html>
